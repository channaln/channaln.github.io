<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="js/theme-init.js"></script>
  <title>Post — channa.dev</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,500;0,600;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/minimal.css">
  <link rel="stylesheet" href="css/glass.css">
</head>
<body class="page-root">
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">channa<span>.dev</span></a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="experience.html">Experience</a></li>
          <li><a href="blog_list.html">Blog</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div class="post-wrap glass-panel" style="max-width:var(--art); margin-top:1rem">
        <a href="blog_list.html" class="post-back" id="pv-back">← Back to Blog</a>
        <div class="post-header">
          <p class="post-label" id="pv-topics" style="display:none"></p>
          <h1 class="post-title" id="pv-title">Loading…</h1>
          <p class="post-meta" id="pv-meta"></p>
        </div>
        <div class="post-content" id="pv-body"></div>
      </div>
    </div>
  </main>
  <footer class="footer">
    <div class="container">
      <p>Preview and draft posts (local only unless exported).</p>
    </div>
  </footer>
  <script src="js/sanitize.js"></script>
  <script src="js/site-settings.js" defer></script>
  <script>
(function () {
  var params = new URLSearchParams(location.search);
  var slug = params.get("slug");
  if (!slug) {
    document.getElementById("pv-title").textContent = "Missing post";
    return;
  }
  var raw;
  try {
    raw = localStorage.getItem("channa:posts");
  } catch (e) { raw = null; }
  if (!raw) {
    document.getElementById("pv-title").textContent = "No drafts in this browser";
    return;
  }
  var list = JSON.parse(raw);
  var post = (Array.isArray(list) ? list : []).find(function (p) { return p.slug === slug; });
  if (!post) {
    document.getElementById("pv-title").textContent = "Post not found";
    return;
  }
  var vTitle = post.title || "Untitled";
  if (typeof formatBlogTitle === "function" && post.title) vTitle = formatBlogTitle(post.title);
  document.getElementById("pv-title").textContent = vTitle;
  document.title = vTitle + " — channa.dev";
  document.getElementById("pv-meta").textContent = (post.date || "") + " · " + (post.readMin != null ? post.readMin : 5) + " min read";
  document.getElementById("pv-body").innerHTML = post.html || "<p></p>";
  var topics = typeof sanitizeTopicList === "function" ? sanitizeTopicList(post.topics) : [];
  if (topics.length) {
    var el = document.getElementById("pv-topics");
    el.textContent = topics.join(" · ");
    el.style.display = "block";
  }
})();
  </script>
  <script src="js/code-block-expand.js" defer></script>
</body>
</html>
