<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Professional illustration for the Workloop Framework</title>
  <desc id="desc">A professional workflow illustration with cards, review flow, product notes, and follow-up loops.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="40" x2="1110" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5E9D5"/>
      <stop offset="0.52" stop-color="#E9EEF5"/>
      <stop offset="1" stop-color="#DCE7DF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F7F2E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#182230" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1020" cy="108" r="74" fill="#D6E8F1"/>
  <circle cx="144" cy="120" r="92" fill="#F8DDB5" fill-opacity="0.8"/>
  <circle cx="1088" cy="560" r="116" fill="#E7D9C6" fill-opacity="0.6"/>

  <g filter="url(#shadow)">
    <rect x="84" y="90" width="320" height="440" rx="28" fill="url(#panel)"/>
    <rect x="450" y="132" width="660" height="366" rx="30" fill="#FFFDF9"/>
  </g>

  <g font-family="DM Sans, Arial, sans-serif">
    <text x="132" y="156" fill="#172230" font-size="24" font-weight="700">Daily Work Signals</text>
    <text x="132" y="190" fill="#5E6875" font-size="16">Capture what broke before the day moves on</text>
  </g>

  <g>
    <rect x="124" y="230" width="236" height="58" rx="16" fill="#F8EFE2"/>
    <rect x="124" y="306" width="236" height="58" rx="16" fill="#EDF4F7"/>
    <rect x="124" y="382" width="236" height="58" rx="16" fill="#EEF5EE"/>
    <rect x="124" y="458" width="236" height="58" rx="16" fill="#FCEDE8"/>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" fill="#182230" font-size="18" font-weight="600">
    <text x="150" y="266">Product gap</text>
    <text x="150" y="342">Follow-up gap</text>
    <text x="150" y="418">Work tracking gap</text>
    <text x="150" y="494">Soft-skill gap</text>
  </g>

  <g font-family="DM Sans, Arial, sans-serif">
    <text x="504" y="182" fill="#172230" font-size="34" font-weight="800">The Workloop Framework</text>
    <text x="504" y="218" fill="#5E6875" font-size="18">Turn daily weakness signals into a repeatable work-improvement loop</text>
  </g>

  <g>
    <rect x="510" y="262" width="128" height="112" rx="22" fill="#FCEADF"/>
    <rect x="666" y="262" width="128" height="112" rx="22" fill="#EDF4F7"/>
    <rect x="822" y="262" width="128" height="112" rx="22" fill="#EEF5EE"/>
    <rect x="978" y="262" width="96" height="112" rx="22" fill="#F9EFE4"/>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" fill="#172230">
    <text x="574" y="314" text-anchor="middle" font-size="24" font-weight="700">Signal</text>
    <text x="730" y="314" text-anchor="middle" font-size="24" font-weight="700">Scope</text>
    <text x="886" y="314" text-anchor="middle" font-size="24" font-weight="700">Cause</text>
    <text x="1026" y="314" text-anchor="middle" font-size="24" font-weight="700">Action</text>

    <text x="574" y="342" text-anchor="middle" font-size="15">what happened</text>
    <text x="730" y="342" text-anchor="middle" font-size="15">where it belongs</text>
    <text x="886" y="342" text-anchor="middle" font-size="15">why it happened</text>
    <text x="1026" y="342" text-anchor="middle" font-size="15">what changes</text>
  </g>

  <path d="M639 318H661" stroke="#1E2D3D" stroke-width="6" stroke-linecap="round"/>
  <path d="M795 318H817" stroke="#1E2D3D" stroke-width="6" stroke-linecap="round"/>
  <path d="M951 318H973" stroke="#1E2D3D" stroke-width="6" stroke-linecap="round"/>

  <g>
    <path d="M556 414C647 472 803 486 952 434" stroke="#D2694D" stroke-width="12" stroke-linecap="round"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="4s" repeatCount="indefinite"/>
    <path d="M930 412L965 430L935 455" stroke="#D2694D" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;4 -2;0 0" dur="3.2s" repeatCount="indefinite"/>
    <text x="748" y="520" text-anchor="middle" fill="#495767" font-family="DM Sans, Arial, sans-serif" font-size="24" font-weight="700">Review and repeat on the next real task</text>
  </g>
</svg>
