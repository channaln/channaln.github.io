<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">2024 developer learning resources chart</title>
  <desc id="desc">Bar chart showing popular online resources developers use to learn: technical documentation, Stack Overflow, written tutorials, blogs, and AI.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1130" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EA"/>
      <stop offset="1" stop-color="#E7EEF5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#122033" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <rect x="72" y="72" width="1056" height="616" rx="28" fill="#FFFDF9" filter="url(#shadow)"/>

  <g font-family="DM Sans, Arial, sans-serif" fill="#182230">
    <text x="120" y="138" font-size="36" font-weight="800">Where developers say they learn now</text>
    <text x="120" y="174" font-size="20">Stack Overflow Developer Survey 2024, online resources used to learn code</text>
  </g>

  <g stroke="#D7DEE8" stroke-width="1">
    <line x1="314" y1="238" x2="1040" y2="238"/>
    <line x1="314" y1="320" x2="1040" y2="320"/>
    <line x1="314" y1="402" x2="1040" y2="402"/>
    <line x1="314" y1="484" x2="1040" y2="484"/>
    <line x1="314" y1="566" x2="1040" y2="566"/>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" font-size="24" fill="#223042">
    <text x="120" y="248">Technical documentation</text>
    <text x="120" y="330">Stack Overflow</text>
    <text x="120" y="412">Written tutorials</text>
    <text x="120" y="494">Blogs</text>
    <text x="120" y="576">AI tools</text>
  </g>

  <g>
    <rect x="314" y="214" width="610" height="40" rx="20" fill="#D35C45"/>
    <rect x="314" y="296" width="585" height="40" rx="20" fill="#DC8D34"/>
    <rect x="314" y="378" width="498" height="40" rx="20" fill="#6B8DA3"/>
    <rect x="314" y="460" width="447" height="40" rx="20" fill="#7AA0B6"/>
    <rect x="314" y="542" width="270" height="40" rx="20" fill="#8DB16D"/>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#182230">
    <text x="946" y="242">83.9%</text>
    <text x="921" y="324">80.3%</text>
    <text x="834" y="406">68.4%</text>
    <text x="783" y="488">61.4%</text>
    <text x="606" y="570">37.0%</text>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" fill="#536171">
    <text x="120" y="654" font-size="18">Source: Stack Overflow Developer Survey 2024, “Online resources to learn how to code.”</text>
    <text x="120" y="682" font-size="18">The practical implication: growth systems for developers must work inside documentation-heavy, work-embedded learning.</text>
  </g>
</svg>
