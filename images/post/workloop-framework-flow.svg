<svg width="1200" height="740" viewBox="0 0 1200 740" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workloop framework flowchart</title>
  <desc id="desc">A clean flowchart showing Signal, Scope, Cause, Action, and Review with examples around work, products, follow-up, and soft skills.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="50" x2="1120" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EA"/>
      <stop offset="1" stop-color="#E7EEF4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#172230" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="740" rx="32" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="70" y="104" width="190" height="124" rx="24" fill="#FFF4E8"/>
    <rect x="292" y="104" width="190" height="124" rx="24" fill="#EEF5F8"/>
    <rect x="514" y="104" width="190" height="124" rx="24" fill="#EEF5EE"/>
    <rect x="736" y="104" width="190" height="124" rx="24" fill="#F8EFE3"/>
    <rect x="958" y="104" width="170" height="124" rx="24" fill="#FCEEE9"/>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" fill="#172230">
    <text x="165" y="154" text-anchor="middle" font-size="28" font-weight="800">Signal</text>
    <text x="387" y="154" text-anchor="middle" font-size="28" font-weight="800">Scope</text>
    <text x="609" y="154" text-anchor="middle" font-size="28" font-weight="800">Cause</text>
    <text x="831" y="154" text-anchor="middle" font-size="28" font-weight="800">Action</text>
    <text x="1043" y="154" text-anchor="middle" font-size="28" font-weight="800">Review</text>

    <text x="165" y="188" text-anchor="middle" font-size="16">what felt weak</text>
    <text x="387" y="188" text-anchor="middle" font-size="16">product, work,</text>
    <text x="387" y="210" text-anchor="middle" font-size="16">follow-up, soft skill</text>
    <text x="609" y="188" text-anchor="middle" font-size="16">knowledge, process,</text>
    <text x="609" y="210" text-anchor="middle" font-size="16">judgment, behavior</text>
    <text x="831" y="188" text-anchor="middle" font-size="16">one small correction</text>
    <text x="1043" y="188" text-anchor="middle" font-size="16">did the weakness</text>
    <text x="1043" y="210" text-anchor="middle" font-size="16">reduce later?</text>
  </g>

  <g stroke="#1D2A39" stroke-width="6" stroke-linecap="round">
    <path d="M262 166H288"/>
    <path d="M484 166H510"/>
    <path d="M706 166H732"/>
    <path d="M928 166H952"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="334" width="960" height="286" rx="28" fill="#FFFDF9"/>
  </g>
  <g font-family="DM Sans, Arial, sans-serif" fill="#172230">
    <text x="170" y="390" font-size="30" font-weight="800">How to classify the same kind of weakness correctly</text>
  </g>

  <g font-family="DM Sans, Arial, sans-serif" font-size="21" fill="#172230">
    <text x="170" y="456" font-weight="700">Product gap:</text>
    <text x="312" y="456">I do not understand the feature or component well enough yet.</text>

    <text x="170" y="510" font-weight="700">Work gap:</text>
    <text x="292" y="510">I know the topic, but my execution flow is weak or incomplete.</text>

    <text x="170" y="564" font-weight="700">Follow-up gap:</text>
    <text x="330" y="564">I had the right action, but I did not return, track, or close it.</text>

    <text x="170" y="618" font-weight="700">Soft-skill gap:</text>
    <text x="318" y="618">The issue was in clarity, communication, prioritization, or ownership.</text>
  </g>
</svg>
