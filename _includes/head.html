<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Update the viewport meta tag to disable zooming -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

  <title>{{site.title}} | {{page.title}}</title>
  
  <!-- Update the stylesheets based on the layout -->
  {% if page.layout == "post" %}
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/post.css" />
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/syntax.css" />
  {% else %}
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/blog.css" />
  {% endif %}
  
  <!-- Add or modify stylesheets for desktop -->
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/desktop.css" />
  
  <!-- Include common stylesheet -->
  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/common.css" />
  
  <!-- Include JavaScript for categories and theme -->
  <script src="{{site.baseurl}}/assets/js/categories.js"></script>
  <script>
    const currentTheme = localStorage.getItem("theme");
    if (currentTheme) {
      document.documentElement.setAttribute(
        "data-theme",
        localStorage.getItem("theme")
      );
    }
  </script>
  
  <!-- Include JavaScript specific to post layout if needed -->
  {% if page.layout == "post" %}
  <script defer src="{{site.baseurl}}/assets/js/lbox.js"></script>
  {% endif %}
</head>
