<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apache HTTP Server — Complete Feature Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c12;
  --bg2: #0e1520;
  --bg3: #141d2b;
  --bg4: #1a2536;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #c8d4e4;
  --text2: #6b7e96;
  --text3: #3d5068;
  --accent: #f97316;
  --accent2: #fb923c;
  --teal: #14b8a6;
  --blue: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --purple: #a855f7;
  --yellow: #eab308;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;line-height:1.6;min-height:100vh;overflow-x:hidden;}

/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(8,12,18,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;height:60px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-0.5px;white-space:nowrap;}
.logo span{color:var(--accent);}
.search-wrap{flex:1;position:relative;max-width:400px;}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 14px 8px 36px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.count-badge{margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);}

/* CATEGORY NAV */
.cat-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;scrollbar-width:none;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-nav-inner{max-width:1400px;margin:0 auto;display:flex;gap:2px;padding:8px 0;}
.cat-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.cat-btn:hover{background:var(--bg3);color:var(--text);}
.cat-btn.active{background:var(--accent);color:#fff;}
.cat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6;}

/* MAIN CONTENT */
main{max-width:1400px;margin:0 auto;padding:28px 24px;}
.section-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:40px;}

/* FEATURE CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer;position:relative;}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.card.expanded{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.card-anim{height:140px;position:relative;overflow:hidden;background:var(--bg3);}
.card-body{padding:16px;}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cat-tag{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:500;letter-spacing:0.5px;}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:6px;}
.card-desc{font-size:11.5px;color:var(--text2);line-height:1.7;}
.card-expand{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none;}
.card.expanded .card-expand{display:block;}
.expand-section{margin-bottom:10px;}
.expand-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.config-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:11px;color:var(--teal);line-height:1.8;white-space:pre-wrap;overflow-x:auto;}
.config-block .comment{color:var(--text3);}
.config-block .directive{color:var(--accent2);}
.config-block .value{color:var(--green);}
.example-box{background:var(--bg);border-left:3px solid var(--accent);padding:10px 12px;border-radius:0 6px 6px 0;font-size:11.5px;color:var(--text2);line-height:1.6;}

/* CATEGORY COLORS */
.c-gateway{background:rgba(59,130,246,0.15);color:#60a5fa;}
.c-security{background:rgba(239,68,68,0.15);color:#f87171;}
.c-identity{background:rgba(168,85,247,0.15);color:#c084fc;}
.c-traffic{background:rgba(20,184,166,0.15);color:#2dd4bf;}
.c-performance{background:rgba(234,179,8,0.15);color:#facc15;}
.c-hosting{background:rgba(34,197,94,0.15);color:#4ade80;}
.c-integration{background:rgba(249,115,22,0.15);color:#fb923c;}
.c-observability{background:rgba(99,102,241,0.15);color:#818cf8;}
.c-devops{background:rgba(236,72,153,0.15);color:#f472b6;}
.c-edge{background:rgba(14,165,233,0.15);color:#38bdf8;}

/* ANIMATIONS — shared SVG styles inside cards */
.anim-svg{width:100%;height:100%;}
.flow-line{stroke-dasharray:6 4;animation:flowDash 1.5s linear infinite;}
.flow-line-rev{stroke-dasharray:6 4;animation:flowDash 1.5s linear infinite reverse;}
@keyframes flowDash{to{stroke-dashoffset:-20;}}
.pulse{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3;}}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0;}}
.spin{animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinOrigin{transform-origin:center;animation:spin 3s linear infinite;}
.bounce{animation:bounce 1.5s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px);}}
.scan{animation:scan 2s linear infinite;}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(200%);}}
.scale-pulse{animation:scalePulse 2s ease-in-out infinite;}
@keyframes scalePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1);}}

/* packet animations */
.pkt1{animation:pkt1 2s linear infinite;}
.pkt2{animation:pkt1 2s linear infinite 0.7s;}
.pkt3{animation:pkt1 2s linear infinite 1.4s;}
@keyframes pkt1{0%{transform:translateX(-120px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateX(120px);opacity:0;}}
.pkt-lb1{animation:pktLb1 2.5s linear infinite;}
.pkt-lb2{animation:pktLb2 2.5s linear infinite 0.8s;}
.pkt-lb3{animation:pktLb3 2.5s linear infinite 1.6s;}
@keyframes pktLb1{0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}80%{transform:translate(60px,-28px);opacity:1}85%,100%{transform:translate(60px,-28px);opacity:0}}
@keyframes pktLb2{0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}80%{transform:translate(60px,0px);opacity:1}85%,100%{transform:translate(60px,0px);opacity:0}}
@keyframes pktLb3{0%,30%{transform:translate(0,0);opacity:0}35%{opacity:1}80%{transform:translate(60px,28px);opacity:1}85%,100%{transform:translate(60px,28px);opacity:0}}

/* rate limit — requests then red X */
.req-allow{animation:reqAllow 3s linear infinite;}
.req-block{animation:reqBlock 3s linear infinite 2.2s;}
@keyframes reqAllow{0%{transform:translateX(-50px);opacity:0}15%{opacity:1}50%{transform:translateX(30px);opacity:1}65%,100%{transform:translateX(30px);opacity:0}}
@keyframes reqBlock{0%{transform:translateX(-50px);opacity:0}15%{opacity:1}40%{transform:translateX(-10px);opacity:1}50%,100%{transform:translateX(-10px);opacity:0}}

/* lock shimmer */
.shimmer{animation:shimmer 2.5s ease-in-out infinite;}
@keyframes shimmer{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}

/* health check ping */
.ping1{animation:ping 2.5s ease-out infinite;}
.ping2{animation:ping 2.5s ease-out infinite 0.5s;}
@keyframes ping{0%{r:4;opacity:1}100%{r:18;opacity:0}}

/* cache hit */
.miss-line{animation:missLine 4s linear infinite;}
.hit-line{animation:hitLine 4s linear infinite 2s;}
@keyframes missLine{0%{stroke-dashoffset:100}50%{stroke-dashoffset:0}51%,100%{stroke-dashoffset:0;opacity:0}}
@keyframes hitLine{0%,50%{opacity:0}55%{opacity:1;stroke-dashoffset:60}100%{stroke-dashoffset:0;opacity:1}}

/* compress */
.compress-bar{animation:compressBar 2s ease-in-out infinite;}
@keyframes compressBar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.35)}}

/* websocket bidirectional */
.ws-up{animation:wsUp 1.2s linear infinite;}
.ws-dn{animation:wsDn 1.2s linear infinite 0.6s;}
@keyframes wsUp{0%{transform:translateY(30px);opacity:0}30%{opacity:1}70%{opacity:1}100%{transform:translateY(-30px);opacity:0}}
@keyframes wsDn{0%{transform:translateY(-30px);opacity:0}30%{opacity:1}70%{opacity:1}100%{transform:translateY(30px);opacity:0}}

/* canary split */
.heavy-flow{animation:heavyFlow 2s linear infinite;}
.light-flow{animation:lightFlow 2s linear infinite;}
@keyframes heavyFlow{0%,100%{stroke-dashoffset:-40}0%{opacity:1}}
@keyframes lightFlow{0%,100%{stroke-dashoffset:-40}0%{opacity:0.3}}

/* geo arrow */
.geo-arrow{animation:geoArrow 2s ease-in-out infinite;}
@keyframes geoArrow{0%,100%{transform:scale(1)}50%{transform:scale(1.15);filter:brightness(1.4)}}

.no-results{grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);font-size:14px;}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:24px;text-align:center;font-size:11px;color:var(--text3);margin-top:20px;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Apache <span>//</span> Feature Atlas</div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="search features, modules, use cases…" oninput="filterCards()">
    </div>
    <div class="count-badge" id="countBadge">55 features</div>
  </div>
</header>

<div class="cat-nav">
  <div class="cat-nav-inner" id="catNav"></div>
</div>

<main id="main"></main>

<footer>Apache HTTP Server — Complete Feature Reference &nbsp;·&nbsp; All 55+ features with animated diagrams</footer>

<script>
const features = [
  // ─── GATEWAY ────────────────────────────────────
  {
    cat:"Gateway", id:"reverse-proxy",
    role:"Reverse Proxy", what:"Apache sits in front and forwards requests to a hidden backend server. Users never see the real address.",
    modules:"mod_proxy, mod_proxy_http",
    config:`ProxyPass "/app" "http://localhost:8080/"\nProxyPassReverse "/app" "http://localhost:8080/"`,
    example:"Users visit app.example.com on port 443. Apache forwards to localhost:8080 where the Node.js app runs.",
    anim:"reverse-proxy"
  },
  {
    cat:"Gateway", id:"forward-proxy",
    role:"Forward Proxy", what:"Apache acts as an exit gateway — internal users browse the internet through Apache, enabling logging and access controls.",
    modules:"mod_proxy",
    config:`ProxyRequests On\nProxyVia On\n<Proxy "*">\n  Require ip 10.0.0.0/8\n</Proxy>`,
    example:"A company routes all employee web traffic through Apache so it can log URLs, block social media, and enforce policy.",
    anim:"forward-proxy"
  },
  {
    cat:"Gateway", id:"api-routing",
    role:"API Gateway", what:"Central entry point for all API services. Routes /api/users to User Service, /api/orders to Order Service, etc.",
    modules:"mod_proxy, mod_rewrite",
    config:`ProxyPass "/api/users"  "http://user-svc:3001/"\nProxyPass "/api/orders" "http://order-svc:3002/"\nProxyPass "/api/pay"    "http://pay-svc:3003/"`,
    example:"A microservices backend exposes one public endpoint. Apache routes by path prefix to 12 internal services.",
    anim:"api-routing"
  },
  {
    cat:"Gateway", id:"ajp-proxy",
    role:"AJP Proxy (Tomcat)", what:"Binary protocol bridge between Apache and old Java/Tomcat systems — faster than HTTP for internal traffic.",
    modules:"mod_proxy_ajp",
    config:`ProxyPass "/java-app" "ajp://localhost:8009/"\nProxyPassReverse "/java-app" "ajp://localhost:8009/"`,
    example:"A bank's 2005-era HR portal runs on Apache Tomcat via AJP — Apache provides SSL and logging in front of it.",
    anim:"ajp-proxy"
  },
  {
    cat:"Gateway", id:"container-gateway",
    role:"Container Gateway", what:"Routes HTTP traffic into Docker containers or Kubernetes pods using their internal network addresses.",
    modules:"mod_proxy_http, mod_proxy_balancer",
    config:`ProxyPass "/service" "http://172.17.0.2:8080/"\n# or with docker DNS:\nProxyPass "/service" "http://mycontainer:8080/"`,
    example:"A Docker Compose app exposes only Apache on port 80. All containers (Redis, Postgres, Node) stay on the internal Docker network.",
    anim:"container-gateway"
  },
  {
    cat:"Gateway", id:"graphql-gateway",
    role:"GraphQL Gateway", what:"Single /graphql endpoint that Apache routes to the GraphQL engine, with optional caching and auth headers injected.",
    modules:"mod_proxy_http, mod_headers",
    config:`ProxyPass "/graphql" "http://gql-engine:4000/graphql"\nHeader set Access-Control-Allow-Origin "*"\nHeader set X-Internal-Service "true"`,
    example:"A React SPA sends all queries to /graphql. Apache forwards to Hasura engine and injects the admin secret header.",
    anim:"graphql-gateway"
  },
  {
    cat:"Gateway", id:"websocket-proxy",
    role:"WebSocket Proxy", what:"Upgrades HTTP connections to persistent WebSocket channels and keeps them open indefinitely.",
    modules:"mod_proxy_wstunnel",
    config:`RewriteEngine on\nRewriteCond %{HTTP:Upgrade} websocket [NC]\nRewriteRule /ws/(.*) ws://localhost:8080/$1 [P,L]`,
    example:"A live stock trading dashboard connects via wss:// and receives price updates every millisecond without polling.",
    anim:"websocket"
  },
  {
    cat:"Gateway", id:"grpc-proxy",
    role:"gRPC Proxy", what:"Forwards binary gRPC (HTTP/2 + protobuf) calls from browser-friendly clients to internal microservices.",
    modules:"mod_proxy_http2",
    config:`<Location "/grpc/">\n  ProxyPass "h2://grpc-backend:50051/"\n  ProxyPassReverse "h2://grpc-backend:50051/"\n</Location>`,
    example:"A mobile app uses gRPC for efficiency. Apache bridges it to internal Go microservices over HTTP/2.",
    anim:"grpc-proxy"
  },

  // ─── SECURITY ───────────────────────────────────
  {
    cat:"Security", id:"tls",
    role:"TLS Termination (HTTPS)", what:"Apache decrypts HTTPS traffic at the edge. Backend servers receive plain HTTP — no SSL overhead for them.",
    modules:"mod_ssl",
    config:`<VirtualHost *:443>\n  SSLEngine on\n  SSLCertificateFile    /etc/ssl/certs/site.crt\n  SSLCertificateKeyFile /etc/ssl/private/site.key\n</VirtualHost>`,
    example:"A login page is served over HTTPS. Apache holds the certificate; the backend Python app receives plain HTTP requests.",
    anim:"tls"
  },
  {
    cat:"Security", id:"mtls",
    role:"Mutual TLS (mTLS)", what:"Both sides prove identity with certificates. The server also demands a certificate from the client — not just the browser.",
    modules:"mod_ssl",
    config:`SSLVerifyClient require\nSSLVerifyDepth 2\nSSLCACertificateFile /etc/ssl/client-ca.crt`,
    example:"A payment gateway only accepts connections from partner banks holding a specific issued certificate.",
    anim:"mtls"
  },
  {
    cat:"Security", id:"rate-limiting",
    role:"Rate Limiting", what:"Throttles how many requests per second one IP can send. Burst traffic gets queued or rejected.",
    modules:"mod_ratelimit, mod_qos",
    config:`<Location "/api/login">\n  SetOutputFilter RATE_LIMIT\n  SetEnv rate-limit 50\n</Location>`,
    example:"A login endpoint is capped at 10 req/sec per IP. Bots guessing passwords are silently throttled to uselessness.",
    anim:"rate-limit"
  },
  {
    cat:"Security", id:"waf",
    role:"WAF (Web App Firewall)", what:"Deep packet inspection — scans every request body for SQL injection, XSS, and other attack signatures.",
    modules:"mod_security2",
    config:`SecRuleEngine On\nInclude /etc/modsecurity/owasp-crs/*.conf\nSecRule ARGS "@detectSQLi" \\\n  "id:1001,deny,status:403"`,
    example:"A hacker submits ' OR 1=1; -- in a form field. The WAF matches the SQLi pattern and returns 403 before the app sees it.",
    anim:"waf"
  },
  {
    cat:"Security", id:"ip-restriction",
    role:"IP Restriction", what:"Allow or deny access to resources based on the originating IP address or CIDR network range.",
    modules:"mod_authz_host",
    config:`<Location "/admin">\n  Require ip 10.0.0.0/8\n  Require ip 192.168.1.0/24\n</Location>`,
    example:"The /admin panel is only reachable from the office IP range. Requests from anywhere else get a 403.",
    anim:"ip-restrict"
  },
  {
    cat:"Security", id:"secrets-protection",
    role:"Secrets Protection", what:"Blocks direct access to sensitive files (.env, .git, .htpasswd) that should never be served publicly.",
    modules:"mod_authz_core",
    config:`<FilesMatch "(\.env|\.git|composer\.json|package\.json)$">\n  Require all denied\n</FilesMatch>`,
    example:"A developer accidentally deployed a .env file. Apache blocks all requests to *.env with a 403 before they leak credentials.",
    anim:"secrets"
  },
  {
    cat:"Security", id:"security-headers",
    role:"Security Headers", what:"Injects HTTP response headers that instruct browsers to enforce HTTPS, block iframes, and prevent MIME sniffing.",
    modules:"mod_headers",
    config:`Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"\nHeader always set X-Frame-Options "SAMEORIGIN"\nHeader always set X-Content-Type-Options "nosniff"\nHeader always set Content-Security-Policy "default-src 'self'"`,
    example:"A bank site gets A+ on securityheaders.com. Browsers refuse to load it in iframes (clickjacking prevention).",
    anim:"sec-headers"
  },
  {
    cat:"Security", id:"cors",
    role:"CORS Control", what:"Adds headers that tell browsers which external origins may call this API. Without this, browsers block cross-origin requests.",
    modules:"mod_headers",
    config:`Header always set Access-Control-Allow-Origin "https://app.example.com"\nHeader always set Access-Control-Allow-Methods "GET,POST,OPTIONS"\nHeader always set Access-Control-Allow-Headers "Authorization,Content-Type"`,
    example:"A Vue SPA on app.example.com calls api.example.com. Apache CORS headers allow it. Other domains are blocked.",
    anim:"cors"
  },
  {
    cat:"Security", id:"bot-protection",
    role:"Bot Protection", what:"Detects and blocks automated scrapers, credential stuffers, and vulnerability scanners based on behaviour patterns.",
    modules:"mod_security2, mod_evasive",
    config:`DOSHashTableSize 3097\nDOSPageCount  5\nDOSSiteCount  50\nDOSBlockingPeriod 600`,
    example:"A scraper hits product pages 2000 times/hour. mod_evasive detects the pattern and bans the IP for 10 minutes.",
    anim:"bot-protect"
  },
  {
    cat:"Security", id:"ip-reputation",
    role:"IP Reputation Blocking", what:"Imports threat intelligence lists (TOR exits, known botnets) and blocks them before they reach the application.",
    modules:"mod_maxminddb, mod_rewrite",
    config:`# Load MaxMind GeoIP2 database\nMaxMindDBFile /etc/apache2/GeoLite2-City.mmdb\n# Block based on threat score\nRewriteCond %{ENV:MM_threat_level} high [NC]\nRewriteRule .* - [F,L]`,
    example:"A media site blocks all TOR exit nodes. Fraudulent signups from known bot IPs drop by 90% overnight.",
    anim:"ip-reputation"
  },
  {
    cat:"Security", id:"timeout-control",
    role:"Timeout Control", what:"Sets maximum durations for connections, headers, and request bodies to prevent Slowloris and slow-POST attacks.",
    modules:"mod_reqtimeout",
    config:`RequestReadTimeout header=20-40,MinRate=500\nRequestReadTimeout body=20,MinRate=500\nTimeOut 60`,
    example:"An attacker opens 500 connections and sends headers at 1 byte/second. mod_reqtimeout closes them after 20s.",
    anim:"timeout"
  },
  {
    cat:"Security", id:"ocsp-stapling",
    role:"OCSP Stapling", what:"Apache pre-fetches certificate revocation status from the CA and attaches it to the TLS handshake — removing a slow client round-trip.",
    modules:"mod_ssl",
    config:`SSLUseStapling on\nSSLStaplingCache "shmcb:logs/ssl_stapling(32768)"\nSSLStaplingResponderTimeout 5`,
    example:"TLS handshake drops 200ms per user because the browser skips the OCSP lookup — Apache already confirmed the cert is valid.",
    anim:"ocsp"
  },

  // ─── IDENTITY ───────────────────────────────────
  {
    cat:"Identity", id:"ldap-auth",
    role:"LDAP / Active Directory Auth", what:"Employees log in with their Windows domain credentials. Apache checks with the corporate AD server.",
    modules:"mod_authnz_ldap",
    config:`AuthType Basic\nAuthName "Corporate Portal"\nAuthBasicProvider ldap\nAuthLDAPURL "ldap://ad.corp.com/DC=corp,DC=com"\nRequire valid-user`,
    example:"Staff access the HR portal with their Windows login. No second password to manage — single source of truth.",
    anim:"ldap"
  },
  {
    cat:"Identity", id:"oidc-sso",
    role:"OIDC / OAuth2 SSO", what:"Delegates authentication to an external identity provider (Google, Okta, Azure AD) using OpenID Connect.",
    modules:"mod_auth_openidc",
    config:`OIDCProviderMetadataURL https://accounts.google.com/.well-known/openid-configuration\nOIDCClientID     my-client-id\nOIDCClientSecret my-secret\nOIDCRedirectURI  https://myapp.com/redirect_uri`,
    example:"A developer dashboard shows a 'Sign in with Google' button. Apache handles the OAuth flow; the app gets a verified user token.",
    anim:"oidc"
  },
  {
    cat:"Identity", id:"saml-sso",
    role:"SAML SSO", what:"Enterprise federation standard. Users log in once via their corporate Identity Provider and access many services.",
    modules:"mod_auth_mellon",
    config:`MellonSPPrivateKeyFile  /etc/apache2/saml/sp.key\nMellonSPCertFile        /etc/apache2/saml/sp.cert\nMellonIdPMetadataFile   /etc/apache2/saml/idp-metadata.xml`,
    example:"A corporate intranet uses Azure AD as the IdP. Employees log in to Windows and get automatic access to 30 internal apps.",
    anim:"saml"
  },
  {
    cat:"Identity", id:"kerberos",

// routing c-routing for cat tag
const clsMap = {
  "Gateway":"c-gateway","Security":"c-security","Identity":"c-identity",
  "Traffic":"c-traffic","Performance":"c-performance","Hosting":"c-hosting",
  "Routing":"c-gateway","Integration":"c-integration",
  "Observability":"c-observability","DevOps":"c-devops","Edge":"c-edge"
};

let activeCategory = "All";
let searchQuery = "";

// ── BUILD NAV ──────────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('catNav');
  const cats = ["All", ...Object.keys(catMeta)];
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (c === "All" ? ' active' : '');
    b.textContent = c;
    b.onclick = () => {
      activeCategory = c;
      document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    };
    nav.appendChild(b);
  });
}

function filterCards() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  render();
}

function getFiltered() {
  return features.filter(f => {
    const catOk = activeCategory === "All" || f.cat === activeCategory;
    const q = searchQuery;
    if (!q) return catOk;
    const haystack = [f.cat, f.role, f.what, f.modules, f.example].join(' ').toLowerCase();
    return catOk && haystack.includes(q);
  });
}

// ── GROUP by category ─────────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  document.getElementById('countBadge').textContent = filtered.length + ' features';
  const main = document.getElementById('main');
  main.innerHTML = '';

  if (filtered.length === 0) {
    main.innerHTML = '<div class="grid"><div class="no-results">No matching features found.</div></div>';
    return;
  }

  const grouped = {};
  filtered.forEach(f => {
    if (!grouped[f.cat]) grouped[f.cat] = [];
    grouped[f.cat].push(f);
  });

  Object.entries(grouped).forEach(([cat, items]) => {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = cat;
    main.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach(f => grid.appendChild(makeCard(f)));
    main.appendChild(grid);
  });
}

// ── CARD ──────────────────────────────────────────────────────────────────
function makeCard(f) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-anim">${svgAnim(f.anim, f.cat)}</div>
    <div class="card-body">
      <div class="card-meta">
        <span class="cat-tag ${clsMap[f.cat] || 'c-gateway'}">${f.cat}</span>
        <span style="font-size:10px;color:var(--text3)">${f.modules}</span>
      </div>
      <div class="card-title">${f.role}</div>
      <div class="card-desc">${f.what}</div>
      <div class="card-expand">
        <div class="expand-section">
          <div class="expand-label">Config snippet</div>
          <pre class="config-block">${colorize(f.config)}</pre>
        </div>
        <div class="expand-section">
          <div class="expand-label">Real-world example</div>
          <div class="example-box">${f.example}</div>
        </div>
      </div>
    </div>`;
  card.onclick = () => card.classList.toggle('expanded');
  return card;
}

function colorize(cfg) {
  return cfg
    .replace(/(#[^\n]+)/g, '<span class="comment">$1</span>')
    .replace(/^([A-Za-z][A-Za-z0-9_]+)(\s)/gm, '<span class="directive">$1</span>$2')

}
